<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Light Switch Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f1;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.08);
      --border-mid: rgba(0,0,0,0.14);
      --text: #1a1a18;
      --muted: #888883;
      --faint: #b8b8b3;
      --radius-card: 20px;
      --radius-md: 10px;
      --radius-sm: 7px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #131312;
        --surface: #1e1e1c;
        --border: rgba(255,255,255,0.07);
        --border-mid: rgba(255,255,255,0.13);
        --text: #e8e8e4;
        --muted: #7a7a75;
        --faint: #3d3d3a;
      }
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "DM Sans", system-ui, sans-serif;
      display: flex;
      justify-content: center;
      padding: 28px 16px 56px;
    }

    .wrap {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-card);
      padding: 1.25rem 1.5rem;
    }

    .card-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.09em;
      margin-bottom: 1rem;
    }

    /* --- Alarm card --- */
    .alarm-display {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .time-big {
      font-size: 52px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .countdown-wrap { text-align: right; }

    .countdown-label {
      font-size: 11px;
      color: var(--faint);
      margin-bottom: 3px;
    }

    .countdown-val {
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 4px 10px;
      border-radius: 99px;
      border: 0.5px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--faint);
    }
    .dot.active { background: #4caf50; }

    .progress-track {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      margin: 1rem 0 0.875rem;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--muted);
      width: 72%;
      transition: width 1s linear;
    }

    .alarm-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="time"] {
      flex: 1;
      font-size: 15px;
      font-family: inherit;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border-mid);
      background: var(--bg);
      color: var(--text);
      outline: none;
    }

    input[type="time"]:focus {
      border-color: var(--muted);
    }

    .btn {
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border-mid);
      background: transparent;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: background 100ms ease;
    }

    .btn:hover { background: var(--bg); }
    .btn:active { transform: scale(0.97); }

    /* --- Trigger card --- */
    .trigger-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-card);
      padding: 2.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .trigger-hint {
      font-size: 12px;
      color: var(--faint);
    }

    .big-btn {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 0.5px solid var(--border-mid);
      background: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 120ms ease, transform 120ms ease, border-color 120ms ease;
    }

    .big-btn:hover { border-color: var(--muted); }
    .big-btn:active { transform: scale(0.94); }
    .big-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .big-btn.on {
      background: #e8f5e9;
      border-color: #a5d6a7;
    }

    @media (prefers-color-scheme: dark) {
      .big-btn.on {
        background: #1b2e1c;
        border-color: #4caf50;
      }
    }

    .power-icon {
      width: 32px;
      height: 32px;
      color: var(--muted);
      transition: color 120ms ease;
    }

    .big-btn.on .power-icon { color: #4caf50; }

    /* --- Stats card --- */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 1.125rem;
    }

    .stat {
      background: var(--bg);
      border-radius: var(--radius-md);
      padding: 0.75rem;
      text-align: center;
    }

    .stat .val {
      font-size: 28px;
      font-weight: 500;
      color: var(--text);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .stat .lbl {
      font-size: 11px;
      color: var(--faint);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 72px;
    }

    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      height: 100%;
      justify-content: flex-end;
    }

    .bar {
      width: 100%;
      border-radius: 4px 4px 2px 2px;
      background: var(--border);
      min-height: 4px;
      transition: height 0.4s ease;
    }

    .bar.today { background: var(--muted); }

    .bar-label {
      font-size: 10px;
      color: var(--faint);
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="card">
      <div class="card-title">Daily schedule</div>
      <div class="alarm-display">
        <div>
          <div class="time-big" id="next-time">07:00</div>
          <div>
            <span class="status-pill">
              <span class="dot active" id="alarm-dot"></span>
              <span id="alarm-label">scheduled for tomorrow</span>
            </span>
          </div>
        </div>
        <div class="countdown-wrap">
          <div class="countdown-label">fires in</div>
          <div class="countdown-val" id="time-left">--</div>
        </div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="alarm-row">
        <input type="time" id="alarm-input" value="07:00">
        <button class="btn" onclick="saveAlarm()">Save</button>
      </div>
    </div>

    <div class="trigger-card">
      <div class="trigger-hint">Tap to trigger now</div>
      <button class="big-btn" id="manual-btn" onclick="manualTrigger()" aria-label="Trigger switch">
        <svg class="power-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2v6"/>
          <path d="M6.3 6.3a8 8 0 1 0 11.4 0"/>
        </svg>
      </button>
    </div>

    <div class="card">
      <div class="card-title">Activity</div>
      <div class="stats-row">
        <div class="stat"><div class="val" id="c24">--</div><div class="lbl">today</div></div>
        <div class="stat"><div class="val" id="c7">--</div><div class="lbl">this week</div></div>
        <div class="stat"><div class="val" id="c30">--</div><div class="lbl">this month</div></div>
      </div>
      <div class="chart-bars" id="chart-bars"></div>
    </div>

  </div>

  <script>
    let userEditing = false;
    let offsetMs = 0;      // server_time - client now
    let cachedState = null;

    document.getElementById('alarm-input').addEventListener('focus', () => userEditing = true);
    document.getElementById('alarm-input').addEventListener('blur', () => userEditing = false);

    function formatLeft(seconds) {
      if (seconds == null || isNaN(seconds)) return '--';
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      if (h > 0) return h + 'h ' + m + 'm';
      return m + 'm ' + (seconds % 60) + 's';
    }

    function buildChart(labels, counts) {
      const wrap = document.getElementById('chart-bars');
      const max = Math.max(...counts, 1);
      // The last bucket is always the current hour (backend fills oldest → newest)
      wrap.innerHTML = labels.map((d, i) => {
        const h = Math.round((counts[i] / max) * 100);
        const isCurrent = i === labels.length - 1;
        return '<div class="bar-col">'
          + '<div class="bar' + (isCurrent ? ' today' : '') + '" style="height:' + h + '%"></div>'
          + '<div class="bar-label">' + d + '</div>'
          + '</div>';
      }).join('');
    }

    async function saveAlarm() {
      const time = document.getElementById('alarm-input').value;
      try {
        await fetch('/api/alarm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ time })
        });
        load();
      } catch (e) {
        console.error('Save failed', e);
      }
    }

    async function manualTrigger() {
      const btn = document.getElementById('manual-btn');
      btn.disabled = true;
      btn.classList.add('on');
      try {
        await fetch('/trigger', { method: 'POST' });
      } catch (e) {
        console.error('Trigger failed', e);
      }
    }

    function renderTick() {
      if (!cachedState) return;
      const nextFire = cachedState.next_fire_iso ? Date.parse(cachedState.next_fire_iso) : null;
      if (!nextFire) return;

      const now = Date.now() + offsetMs;
      const remaining = Math.max(0, Math.round((nextFire - now) / 1000));

      document.getElementById('time-left').textContent = formatLeft(remaining);
      document.getElementById('next-time').textContent = new Date(nextFire).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      const firesDate = new Date(nextFire);
      const todayDate = new Date(now);
      const isToday = firesDate.toDateString() === todayDate.toDateString();
      document.getElementById('alarm-label').textContent = isToday ? 'scheduled for today' : 'scheduled for tomorrow';

      // fill grows as time passes through the 24h cycle
      const pct = 1 - Math.min(Math.max(remaining / 86400, 0), 1);
      document.getElementById('progress-fill').style.width = (pct * 100) + '%';
    }

    async function load() {
      try {
        const res = await fetch('/api/state');
        const data = await res.json();
        cachedState = data;

        if (data.server_time) {
          offsetMs = Date.parse(data.server_time) - Date.now();
        }

        if (!userEditing) {
          document.getElementById('alarm-input').value = data.alarm_time;
        }

        const btn = document.getElementById('manual-btn');
        btn.disabled = !!data.trigger;
        btn.classList.toggle('on', !!data.trigger);

        document.getElementById('c24').textContent = data.counts?.['24h'] ?? '--';
        document.getElementById('c7').textContent = data.counts?.['7d'] ?? '--';
        document.getElementById('c30').textContent = data.counts?.['30d'] ?? '--';

        if (data.series?.labels && data.series?.counts) {
          buildChart(data.series.labels, data.series.counts);
        }

        renderTick();
      } catch (e) {
        console.error('Load failed; falling back to local clock', e);
        // fallback: keep ticking with local time and last known state
        offsetMs = 0;
        if (!cachedState) {
          document.getElementById('time-left').textContent = 'offline';
          return;
        }
        renderTick();
      }
    }

    // Build an empty placeholder chart until first load completes
    buildChart(Array.from({length: 24}, () => ''), new Array(24).fill(0));

    load();
    setInterval(load, 15000);   // resync every 15s
    setInterval(renderTick, 1000); // tick locally using offset
  </script>
</body>
</html>
